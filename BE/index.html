<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Histour Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 20px;
      background: #ffffff;
    }

    h1 {
      margin-bottom: 20px;
    }

    #chat-box {
      border: 1px solid #ccc;
      border-radius: 14px;
      padding: 16px;
      height: 500px;
      overflow-y: auto;
      margin-bottom: 16px;
      background: #fafafa;
    }

    .msg {
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 12px;
      max-width: 80%;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .assistant {
      background: #f1f1f1;
    }

    .user {
      background: #dbeafe;
      margin-left: auto;
    }

    .place-wrap {
      margin: 12px 0;
      max-width: 85%;
    }

    .place-card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }

    .place-card img {
      width: 100%;
      max-width: 320px;
      border-radius: 10px;
      display: block;
      margin-bottom: 10px;
    }

    .place-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .place-desc,
    .place-location {
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .place-link {
      display: inline-block;
      margin-top: 6px;
      color: blue;
      text-decoration: none;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    input {
      padding: 12px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 8px;
    }

    button {
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
      border: 1px solid #bbb;
      background: #fff;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>유관순 챗봇</h1>

  <div id="chat-box"></div>

  <div class="row">
    <input type="text" id="message" placeholder="유관순에게 물어보세요" />
    <button onclick="sendMessage()">전송</button>
  </div>

  <script>
    const chatBox = document.getElementById("chat-box");
    const messageInput = document.getElementById("message");

    let history = [];

    function addMessage(role, content) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = content;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addPlaceCards(places) {
      if (!places || places.length === 0) return;

      places.forEach((place) => {
        const wrap = document.createElement("div");
        wrap.className = "place-wrap";

        wrap.innerHTML = `
          <div class="place-card">
            <div class="place-title">${place.name}</div>
            <img src="${place.image}" alt="${place.name}">
            <div class="place-desc">${place.desc}</div>
            <div class="place-location"><strong>위치:</strong> ${place.location}</div>
            <a class="place-link" href="${place.map_url}" target="_blank">지도 보기</a>
          </div>
        `;

        chatBox.appendChild(wrap);
      });

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function startChat() {
      try {
        const res = await fetch("http://localhost:8000/chat/start");
        const data = await res.json();

        history = data.history || [];
        addMessage("assistant", data.reply);
      } catch (error) {
        console.error("시작 메시지 불러오기 실패:", error);
      }
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      addMessage("user", message);
      messageInput.value = "";

      try {
        const res = await fetch("http://localhost:8000/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: message,
            history: history
          })
        });

        const data = await res.json();

        history = data.history || [];
        addMessage("assistant", data.reply);
        addPlaceCards(data.places);
      } catch (error) {
        console.error("메시지 전송 실패:", error);
      }
    }

    messageInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    startChat();
  </script>
</body>
</html>
