<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>덧셈 계산기</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 80px auto;
      padding: 20px;
    }

    input, button {
      display: block;
      width: 100%;
      margin-bottom: 12px;
      padding: 10px;
      font-size: 16px;
    }

    input {
      background-color: white;
      border: 1px solid #ccc;
      color: black;
    }

    button {
      background-color: darkgreen;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: green;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>숫자 2개 더하기</h1>

  <input type="text" id="a" placeholder="첫 번째 숫자" />
  <input type="text" id="b" placeholder="두 번째 숫자" />
  <button onclick="calculate()">Submit</button>
  <div id="result"></div>

  <script>
  async function calculate() {
    const aValue = document.getElementById("a").value.trim();
    const bValue = document.getElementById("b").value.trim();
    const resultDiv = document.getElementById("result");

    if (aValue === "" || bValue === "") {
      resultDiv.textContent = "숫자를 입력해주세요.";
      return;}

    if (isNaN(aValue) || isNaN(bValue)) {
      resultDiv.textContent = "숫자만 입력해주세요.";
      return;}

    const a = Number(aValue);
    const b = Number(bValue);

    resultDiv.textContent = "계산 중...";

    try {
      const res = await fetch(`/api/add`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ a, b })
      });

      const data = await res.json();

      if (!res.ok) {
        resultDiv.textContent = data.error;
        return;
      }

      resultDiv.textContent = `결과: ${data.result}`;
    } catch (e) {
      resultDiv.textContent = "요청 중 오류 발생";
    }
  }
</script>
</body>
</html>
